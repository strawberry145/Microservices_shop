syntax = "proto3";

package auth;

service AuthService {
  rpc Register (RegisterRequest) returns (AuthResponse);
  rpc Login (LoginRequest) returns (AuthResponse);
  rpc GetMe (GetMeRequest) returns (User);
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string full_name = 3;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message GetMeRequest {
  int32 user_id = 1;
}

message User {
  int32 id = 1;
  string email = 2;
  string full_name = 3;
  optional string phone = 4;
  string created_at = 5;
}

message AuthResponse {
  string token = 1;
  User user = 2;
}
